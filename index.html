<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <title>Dice Game</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <h1>Dice Game</h1>
        <p style="font-size: 30px; text-align:center;">Welcome to the Game!</p>
        <p style="font-size: 20px; text-align:center;">Note: Refresh the website to change the players name.</p>
        <div class="players">
            <div class="player1">
                <p id="player1">Player 1</p>
                <img class="img1" src="images/1.png" alt="Dice" id="diceImage1">
            </div>
            <div class="player2">
                <p id="player2">Player 2</p>
                <img class="img2" src="images/2.png" alt="Dice" id="diceImage2">
            </div>
        </div>
        <p id="resultMessage" style="font-size: 30px; text-align:center;">Click the button to roll the dice again.</p>
        <div class="controls">
            <button id="rollButton" type="button">Roll Dice</button>
        </div>
        
        <script src="script.js" charset="utf-8"></script>
    </body>
</html>
